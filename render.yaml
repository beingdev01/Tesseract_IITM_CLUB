# Render Blueprint for Tesseract
services:
  # Backend API
  - type: web
    name: tesseract-api
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate --schema=./prisma/schema.prisma && npm run build --workspace=apps/api
    startCommand: npx prisma migrate deploy --schema=./prisma/schema.prisma && npm run start --workspace=apps/api
    healthCheckPath: /ping
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: PRISMA_CLIENT_ENGINE_TYPE
        value: binary
      - key: JWT_SECRET
        sync: false
      - key: ATTENDANCE_JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: COOKIE_DOMAIN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: BREVO_API_KEY
        sync: false
      # Required for Puzzle Run / Brain Teasers daily decks + Cipher Lab rotation
      # to actually generate content. Without this, those games have no playable rounds.
      - key: ENABLE_BACKGROUND_SCHEDULERS
        value: "true"

  # Frontend Static Site
  - type: web
    name: tesseract-web
    runtime: static
    buildCommand: npm install && npm run build --workspace=apps/web
    staticPublishPath: ./apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /index.html
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_URL
        sync: false
